<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyborg AI — Painel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#0d1117; --card:#161b22; --border:#30363d; --text:#e6edf3; --muted:#7d8590; --acc:#7DF9FF; }
  *{ box-sizing:border-box; }
  body{ margin:0; min-height:100vh; background:var(--bg); color:var(--text); font-family:'Share Tech Mono',monospace; display:flex; align-items:center; justify-content:center; padding:20px; }
  .card{ width:100%; max-width:520px; background:var(--card); border:1px solid var(--border); border-radius:14px; padding:28px; }
  h1{ font-size:1.4em; letter-spacing:2px; margin:0 0 4px; }
  .sub{ color:var(--muted); font-size:.85em; margin-bottom:22px; }
  .acc{ color:var(--acc); }
  label.f{ display:block; font-size:.8em; color:var(--muted); margin-bottom:6px; }
  input[type=password]{ width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:12px; font-family:inherit; font-size:1em; outline:none; }
  input[type=password]:focus{ border-color:var(--acc); }
  button.primary{ width:100%; margin-top:16px; padding:13px; background:var(--acc); color:#06202b; border:none; border-radius:8px; font-family:inherit; font-weight:700; letter-spacing:1px; cursor:pointer; }
  button.primary:hover{ filter:brightness(1.1); }
  .row{ display:flex; align-items:center; justify-content:space-between; gap:16px; padding:16px 0; border-bottom:1px solid var(--border); }
  .row .t{ font-size:1.05em; }
  .row .d{ font-size:.8em; color:var(--muted); }
  .switch{ position:relative; display:inline-block; width:52px; height:26px; flex-shrink:0; }
  .switch input{ opacity:0; width:0; height:0; }
  .slider{ position:absolute; cursor:pointer; inset:0; background:#333; transition:.3s; border-radius:34px; border:1px solid var(--border); }
  .slider:before{ position:absolute; content:""; height:18px; width:18px; left:4px; bottom:3px; background:#fff; transition:.3s; border-radius:50%; }
  input:checked + .slider{ background:var(--acc); }
  input:checked + .slider:before{ transform:translateX(24px); }
  .stats{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:22px; }
  .stat{ background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:14px; text-align:center; }
  .stat .n{ font-size:1.6em; color:var(--acc); }
  .stat .l{ font-size:.72em; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
  .err{ color:#ff6b6b; font-size:.85em; margin-top:12px; min-height:18px; text-align:center; }
  .hidden{ display:none; }
  .toast{ text-align:center; font-size:.8em; color:var(--muted); margin-top:14px; min-height:16px; }
  .pw-wrap{ position:relative; }
  .pw-wrap input{ padding-right:46px; }
  .eye{ position:absolute; right:6px; top:50%; transform:translateY(-50%); background:transparent; border:none; color:var(--muted); cursor:pointer; padding:6px; display:flex; align-items:center; }
  .eye:hover{ color:var(--acc); }
  .danger{ width:100%; margin-top:10px; padding:12px; background:transparent; color:#ff6b6b; border:1px solid #ff6b6b; border-radius:8px; font-family:inherit; font-weight:700; letter-spacing:1px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; }
  .danger:hover{ background:rgba(255,107,107,0.12); }
  .danger svg{ width:18px; height:18px; fill:currentColor; }
</style>
</head>
<body>
  <div class="card">
    <h1>CYBORG <span class="acc">// PAINEL</span></h1>
    <div class="sub">Controle interno (acesso restrito).</div>

    <div id="gate">
      <label class="f">Senha de administrador</label>
      <div class="pw-wrap">
        <input type="password" id="pw" placeholder="Digite a senha..." autocomplete="off"
               onkeydown="if(event.key==='Enter') entrar()">
        <button type="button" class="eye" id="eye" onclick="toggleSenha()" aria-label="Mostrar ou ocultar a senha" title="Mostrar/ocultar senha">
          <svg id="eye-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5C21.27 7.61 17 4.5 12 4.5zm0 12.5a5 5 0 110-10 5 5 0 010 10zm0-8a3 3 0 100 6 3 3 0 000-6z"/></svg>
        </button>
      </div>
      <button class="primary" onclick="entrar()">ENTRAR</button>
      <div class="err" id="err"></div>
    </div>

    <div id="panel" class="hidden">
      <div class="row">
        <div>
          <div class="t">Gravar conversas no BD</div>
          <div class="d">Quando desligado, o chat funciona mas nada é salvo.</div>
        </div>
        <label class="switch"><input type="checkbox" id="t-gravar" onchange="salvar('gravar_no_bd', this.checked)"><span class="slider"></span></label>
      </div>
      <div class="row">
        <div>
          <div class="t">RAG ligado por padrão</div>
          <div class="d">Define, para todos, se o RAG começa ligado.</div>
        </div>
        <label class="switch"><input type="checkbox" id="t-rag" onchange="salvar('rag_padrao', this.checked)"><span class="slider"></span></label>
      </div>

      <div class="stats">
        <div class="stat"><div class="n" id="s-sessoes">–</div><div class="l">Sessões</div></div>
        <div class="stat"><div class="n" id="s-mensagens">–</div><div class="l">Mensagens</div></div>
        <div class="stat"><div class="n" id="s-documentos">–</div><div class="l">Docs RAG</div></div>
      </div>
      <button class="primary" style="margin-top:20px" onclick="baixarCSV()">Baixar histórico (CSV)</button>
      <button class="danger" onclick="apagarHistorico()"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg> Apagar histórico</button>
      <div class="toast" id="toast"></div>
    </div>
  </div>

<script>
  let SENHA = "";
  const $ = id => document.getElementById(id);

  const EYE_ON = '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5C21.27 7.61 17 4.5 12 4.5zm0 12.5a5 5 0 110-10 5 5 0 010 10zm0-8a3 3 0 100 6 3 3 0 000-6z"/>';
  const EYE_OFF = '<path d="M12 7a5 5 0 015 5c0 .64-.13 1.25-.36 1.82l2.92 2.92c1.51-1.26 2.7-2.89 3.44-4.74C21.27 7.61 17 4.5 12 4.5c-1.4 0-2.74.25-3.98.7l2.16 2.16c.57-.23 1.18-.36 1.82-.36zM2 4.27l2.28 2.28.46.46A11.8 11.8 0 001 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65a3 3 0 003 3c.22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53a5 5 0 01-5-5c0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16a3 3 0 00-3-3l-.17.01z"/>';
  function toggleSenha() {
    const inp = $('pw');
    const mostrando = inp.type === 'text';
    inp.type = mostrando ? 'password' : 'text';
    $('eye-svg').innerHTML = mostrando ? EYE_ON : EYE_OFF;
  }

  async function api(updates) {
    const body = { password: SENHA };
    if (updates) body.updates = updates;
    const r = await fetch('/api/admin/settings', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
    });
    const data = await r.json().catch(() => ({}));
    return { ok: r.ok, status: r.status, data };
  }

  function pintar(d) {
    $('t-gravar').checked = !!d.config.gravar_no_bd;
    $('t-rag').checked = !!d.config.rag_padrao;
    $('s-sessoes').innerText = d.stats.sessoes;
    $('s-mensagens').innerText = d.stats.mensagens;
    $('s-documentos').innerText = d.stats.documentos;
  }

  async function entrar() {
    SENHA = $('pw').value;
    $('err').innerText = "";
    const r = await api(null);
    if (r.ok) { $('gate').classList.add('hidden'); $('panel').classList.remove('hidden'); pintar(r.data); }
    else if (r.status === 401) $('err').innerText = "Senha incorreta.";
    else $('err').innerText = (r.data && r.data.error) || "Erro ao acessar o painel.";
  }

  async function salvar(chave, valor) {
    const t = $('toast'); t.innerText = "Salvando...";
    const r = await api({ [chave]: valor });
    if (r.ok) { pintar(r.data); t.innerText = "Salvo ✓"; setTimeout(() => t.innerText = "", 1500); }
    else { t.innerText = "Falha ao salvar."; }
  }
  async function apagarHistorico() {
    if (!confirm('Apagar TODAS as sessões e mensagens do banco? Esta ação não pode ser desfeita.')) return;
    const t = $('toast'); t.innerText = 'Apagando...';
    try {
      const r = await fetch('/api/admin/clear_history', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: SENHA })
      });
      const data = await r.json().catch(() => ({}));
      if (r.ok) {
        if (data.stats) {
          $('s-sessoes').innerText = data.stats.sessoes;
          $('s-mensagens').innerText = data.stats.mensagens;
          $('s-documentos').innerText = data.stats.documentos;
        }
        t.innerText = 'Histórico apagado \u2713'; setTimeout(() => t.innerText = '', 2000);
      } else { t.innerText = data.error || 'Falha ao apagar.'; }
    } catch (e) { t.innerText = 'Erro ao apagar.'; }
  }

  async function baixarCSV() {
    const t = $('toast'); t.innerText = "Gerando CSV...";
    try {
      const r = await fetch('/api/admin/export', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: SENHA })
      });
      if (!r.ok) { t.innerText = "Falha ao gerar o CSV."; return; }
      const blob = await r.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'historico_cyborg.csv';
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
      t.innerText = "Download iniciado ✓"; setTimeout(() => t.innerText = "", 2000);
    } catch (e) { t.innerText = "Erro ao baixar."; }
  }
</script>
</body>
</html>
